name: Public-Safe Parallel Multi-Target Katana Scan

on:
  workflow_dispatch: 

jobs:
  # [1단계] 20대의 가상머신(0~19) 인덱스 배열을 고정으로 생성
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix-json: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: 가상머신 20대 고정 인덱스 생성
        id: set-matrix
        run: |
          JSON_STRING=$(jq -n -c '[range(0; 20)]')
          echo "matrix=$JSON_STRING" >> $GITHUB_OUTPUT

  # [2단계] 정확히 20대의 가상머신이 97개 도메인을 4~5개씩 나누어서 스캔 진행
  katana-parallel-scan:
    needs: setup-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        index: ${{ fromJson(needs.setup-matrix.outputs.matrix-json) }}
      max-parallel: 20
      fail-fast: false
    
    steps:
      - name: 레포지토리 코드 가져오기
        uses: actions/checkout@v4

      - name: 도구 및 라이브러리 설치
        run: |
          go install github.com/projectdiscovery/katana/cmd/katana@latest
          
      - name: 가상머신별 타겟 도메인 분할 할당 및 연속 스캔
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          
          # 샌드박스 크래시 방어 세팅
          export ROD_FLAGS="--no-sandbox --disable-setuid-sandbox"
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          
          # 현재 가상머신의 고유 번호 (0 ~ 19)
          VM_IDX=${{ matrix.index }}
          
          TOTAL_TARGETS=()
          while list_line= read -r line || [ -n "$line" ]; do
            clean_line=$(echo "$line" | tr -d '\r' | xargs)
            if [ -n "$clean_line" ]; then
              TOTAL_TARGETS+=("$clean_line")
            fi
          done << 'EOF'
          ${{ secrets.TARGET_URLS }}
          EOF
          
          NUM_TARGETS=${#TOTAL_TARGETS[@]}
          
          echo "📊 전체 타겟 개수: $NUM_TARGETS 개"
          echo "⚙️ 현재 가상머신 번호: VM-$VM_IDX"
          echo "===================================================="
          
          touch katana_output.jsonl
          
          # 지능형 20배수 순차 탐색 루프
          for (( i=$VM_IDX; i<$NUM_TARGETS; i+=20 )); do
            TARGET_URL="${TOTAL_TARGETS[$i]}"
            echo "::add-mask::$TARGET_URL"
            
            HOSTNAME=$(echo "$TARGET_URL" | sed -e 's|^[^/]*//||' -e 's|/.*||' -e 's|:.*||')
            echo "🚀 [VM-$VM_IDX] 현재 타겟 스캔 시작: $TARGET_URL (정규식: $HOSTNAME)"
            
            touch temp_verbose.log
            touch temp_output.jsonl
            touch clean_stream.log
            
            # 🔥 [옵션 정정 완료] 오작동을 야기하던 -crawl-strategy 플래그를 순정 명세인 -strategy 로 교체했습니다!
            katana -u "$TARGET_URL" \
              -c 2 \
              -rl 4 \
              -rd 1 \
              -d 3 \
              -js-crawl \
              -automatic-form-fill \
              -strategy depth-first \
              -ex "jpg,jpeg,png,gif,css,woff,woff2,svg,ico,ttf,eot,mp4,avi,mp3" \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36" \
              -H "Accept-Language: ko-KR,ko;q=0.9,en-US;q=0.8" \
              -fs fqdn \
              -cs "$HOSTNAME" \
              -sc \
              -headless \
              -v \
              -jc \
              -jsonl \
              -o temp_output.jsonl > temp_verbose.log 2>&1 &
            
            KATANA_PID=$!
            
            # 실시간 스트리밍 분석 단 (여백 및 개행 무력화 엔진)
            tail -f -n +1 temp_verbose.log 2>/dev/null | while read -r vline; do
              CLEAN_URL=$(echo "$vline" | sed -n 's/.*"endpoint":"\([^"]*\)".*/\1/p')
              [ -z "$CLEAN_URL" ] && CLEAN_URL=$(echo "$vline" | sed -n 's/.*"url":"\([^"]*\)".*/\1/p')
              [ -z "$CLEAN_URL" ] && CLEAN_URL=$(echo "$vline" | grep -o 'https\?://[^[:space:]"\}]\+' | head -n 1)
              
              # 🔥 여백 및 줄바꿈에 왜곡되지 않도록 수식 보강하여 depth 숫자만 100% 추출
              V_DEPTH=$(echo "$vline" | grep -o '"depth"\s*:\s*[0-9]*' | grep -o '[0-9]*' | head -n 1 | tr -d '[:space:]')
              
              if [ -z "$V_DEPTH" ] || ! [[ "$V_DEPTH" =~ ^[1-3]$ ]]; then
                if echo "$vline" | grep -q "Sending request to"; then
                  V_DEPTH="1"
                else
                  V_DEPTH="2"
                fi
              fi
              
              if [ -n "$CLEAN_URL" ] && [ "$CLEAN_URL" != "about:blank" ]; then
                echo "${V_DEPTH}||${CLEAN_URL}" >> clean_stream.log
              fi
            done &
            STREAM_PID=$!
            
            LAST_STREAM_COUNT=0
            IDLE_LOOPS=0
            
            while kill -0 $KATANA_PID 2>/dev/null; do
              sleep 1
              TOTAL_COUNT=$(wc -l < temp_output.jsonl 2>/dev/null | tr -d '[:space:]' || echo 0)
              [ -z "$TOTAL_COUNT" ] && TOTAL_COUNT=0
              
              if [ -f clean_stream.log ]; then
                CURRENT_REQ=$(wc -l < clean_stream.log 2>/dev/null | tr -d '[:space:]' || echo 0)
                tail -n +$((LAST_STREAM_COUNT + 1)) clean_stream.log | while read -r stream_line; do
                  PARSE_DEPTH=$(echo "$stream_line" | cut -d'|' -f1)
                  PARSE_URL=$(echo "$stream_line" | cut -d'|' -f3-)
                  echo "[${CURRENT_REQ}/${TOTAL_COUNT}] [Depth:${PARSE_DEPTH}] ➡️ ${PARSE_URL}"
                done
                LAST_STREAM_COUNT=$CURRENT_REQ
              else
                CURRENT_REQ=0
              fi
              
              if [ "$TOTAL_COUNT" -gt 0 ] && [ "$CURRENT_REQ" -ge "$TOTAL_COUNT" ]; then
                IDLE_LOOPS=$((IDLE_LOOPS + 1))
                if [ "$IDLE_LOOPS" -ge 5 ]; then
                  echo "===================================================="
                  echo "⚠️ [5초 보호장치] 금융 보안 모듈 데드락 감지! 다음 타겟으로 즉시 이동합니다."
                  echo "===================================================="
                  kill -9 $KATANA_PID 2>/dev/null || true
                  break
                fi
              else
                IDLE_LOOPS=0
              fi
            done
            
            kill -9 $STREAM_PID 2>/dev/null || true
            wait $KATANA_PID 2>/dev/null || true
            
            if [ -f temp_output.jsonl ]; then
              cat temp_output.jsonl >> katana_output.jsonl
            fi
            
            # 진단 dumper
            CHK_CNT=$(wc -l < katana_output.jsonl 2>/dev/null | tr -d '[:space:]' || echo 0)
            if [ "$CHK_CNT" -eq 0 ] && [ -f temp_verbose.log ]; then
              echo "❌ [VM-$VM_IDX 스캔 실패 분석 원본 로그]"
              head -n 20 temp_verbose.log || true
            fi
            
            rm -f temp_verbose.log temp_output.jsonl clean_stream.log
            echo "----------------------------------------------------"
          done
          
          FINAL_COUNT=$(wc -l < katana_output.jsonl 2>/dev/null | tr -d '[:space:]')
          [ -z "$FINAL_COUNT" ] && FINAL_COUNT=0
          echo "🏁 [VM-$VM_IDX 완료] 총 할당 타겟 스캔 완료! 누적 수집 개수: ${FINAL_COUNT}개"

      - name: 결과물 비밀번호 압축 암호화
        env:
          ZIP_PWD: ${{ secrets.ARTIFACT_PASSWORD }}
        run: |
          zip -P "$ZIP_PWD" -r "katana_output_${{ matrix.index }}.zip" katana_output.jsonl

      - name: 임시 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: part-${{ matrix.index }}
          path: katana_output_${{ matrix.index }}.zip
          retention-days: 1

  # [3단계] 20대의 가상머신 결과물을 하나로 긁어모아 엑셀 변환 및 디코드 토스
  aggregate-results:
    needs: [setup-matrix, katana-parallel-scan]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 레포지토리 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 필수 라이브러리 설치
        run: pip install pandas openpyxl

      - name: 모든 가상머신의 암호화 임시 파일 다운로드
        uses: actions/download-artifact@v4
        with:
          pattern: part-*
          path: encrypted_parts

      - name: 비밀번호 해독 및 압축 해제
        env:
          ZIP_PWD: ${{ secrets.ARTIFACT_PASSWORD }}
        run: |
          mkdir -p katana_outputs
          if [ -d encrypted_parts ]; then
            find encrypted_parts -name "*.zip" | while read -r zipfile; do
              unzip -P "$ZIP_PWD" -o "$zipfile" -d temp_unzip
              if [ -f temp_unzip/katana_output.jsonl ]; then
                idx=$(basename "$zipfile" .zip | sed 's/katana_output_//')
                mv temp_unzip/katana_output.jsonl "katana_outputs/part_${idx}.jsonl"
              fi
              rm -rf temp_unzip
            done
          fi

      - name: 파이썬 스크립트로 단일 엑셀 변환 (대시보드형 엔진 연동)
        env:
          TARGET_URLS: ${{ secrets.TARGET_URLS }}
        run: python json_to_excel.py

      - name: 최종 통합 엑셀 파일 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: full-scan-report
          path: katana_multi_scan_report.xlsx

      - name: 최종 통합 엑셀 파일 아티팩트 링크 Discord 전송
        run: |
          DOWNLOAD_LINK="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ -s katana_multi_scan_report.xlsx ]; then
            curl -H "Content-Type: application/json" \
                 -X POST \
                 -d "{\"content\": \"🚀 **97개 도메인 배수 균등 할당 완료 및 취약점 탐색 하이퍼링크 대시보드 저장 완료!** \n\n결과 리포트는 아래 링크 최하단 'Artifacts'에서 안전하게 다운로드하세요. \n🔗 **다운로드 바로가기:** $DOWNLOAD_LINK\"}" \
                 "${{ secrets.DISCORD_WEBHOOK }}"
          else
            curl -H "Content-Type: application/json" \
                 -X POST \
                 -d "{\"content\": \"⚠️ 분할 병렬 스캔은 완료되었으나 지정 도메인에 일치하는 수집 데이터가 없습니다.\"}" \
                 "${{ secrets.DISCORD_WEBHOOK }}"
          fi
