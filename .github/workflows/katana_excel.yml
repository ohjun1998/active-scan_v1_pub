name: Public-Safe Parallel Multi-Target Katana Scan

on:
  workflow_dispatch: 

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix-json: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: 가상머신 인덱스 생성
        id: set-matrix
        run: |
          # 오타 버그 수정 완료
          JSON_STRING=$(echo "${{ secrets.TARGET_URLS }}" | jq -R -s -c 'split("\n") | map(select(length > 0)) | keys')
          echo "matrix=$JSON_STRING" >> $GITHUB_OUTPUT

  katana-parallel-scan:
    needs: setup-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        index: ${{ fromJson(needs.setup-matrix.outputs.matrix-json) }}
      max-parallel: 20
      fail-fast: false
    
    steps:
      - name: 타겟 URL 추출 및 마스킹
        run: |
          INDEX=${{ matrix.index }}
          LINE_NUM=$((INDEX + 1))
          TARGET_URL=$(echo "${{ secrets.TARGET_URLS }}" | sed -n "${LINE_NUM}p" | tr -d '\r' | xargs)
          echo "::add-mask::$TARGET_URL"
          echo "TARGET_URL=$TARGET_URL" >> $GITHUB_ENV

      - name: 도구 및 라이브러리 설치
        run: |
          go install github.com/projectdiscovery/katana/cmd/katana@latest
          
      - name: Katana 개별 헤드리스 스캔 & 실시간 로그 모니터링
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          HOSTNAME=$(echo "$TARGET_URL" | sed -e 's|^[^/]*//||' -e 's|/.*||' -e 's|:.*||')
          echo "🌐 스캔 대상 호스트 제한 정규식: $HOSTNAME"
          
          export ROD_FLAGS="--no-sandbox --disable-setuid-sandbox"
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          
          katana -u "$TARGET_URL" \
            -c 2 \
            -rl 5 \
            -rd 1 \
            -d 2 \
            -cs "$HOSTNAME" \
            -sc \
            -headless \
            -v \
            -jc \
            -jsonl \
            -o katana_output.jsonl > katana_verbose.log 2>&1 &
          
          KATANA_PID=$!
          echo "⏳ [VM-${{ matrix.index }}] 고속 샌드박스 우회 스캔 시작 (PID: $KATANA_PID)"
          
          while kill -0 $KATANA_PID 2>/dev/null; do
            sleep 30
            if [ -f katana_output.jsonl ]; then
              CURRENT_COUNT=$(wc -l < katana_output.jsonl)
              echo "📊 [VM-${{ matrix.index }} 진행 상황] 현재까지 지정 호스트 내부에서 ${CURRENT_COUNT}개의 엔드포인트 수집..."
            fi
          done
          
          wait $KATANA_PID
          
          if [ -f katana_output.jsonl ]; then
            FINAL_COUNT=$(wc -l < katana_output.jsonl)
          else
            FINAL_COUNT=0
            touch katana_output.jsonl
          fi
          echo "🏁 [VM-${{ matrix.index }} 완료] 최종 수집: ${FINAL_COUNT}개"

      - name: 결과물 비밀번호 압축 암호화
        env:
          ZIP_PWD: ${{ secrets.ARTIFACT_PASSWORD }}
        run: |
          zip -P "$ZIP_PWD" -r "katana_output_${{ matrix.index }}.zip" katana_output.jsonl

      - name: 임시 아티팩트 업로드
        uses: actions/with-artifact@v4
        uses: actions/upload-artifact@v4
        with:
          name: part-${{ matrix.index }}
          path: katana_output_${{ matrix.index }}.zip
          retention-days: 1

  aggregate-results:
    needs: [setup-matrix, katana-parallel-scan]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 레포지토리 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 필수 라이브러리 설치
        run: pip install pandas openpyxl

      - name: 모든 가상머신의 암호화 임시 파일 다운로드
        uses: actions/download-artifact@v4
        with:
          pattern: part-*
          path: encrypted_parts

      - name: 비밀번호 해독 및 압축 해제
        env:
          ZIP_PWD: ${{ secrets.ARTIFACT_PASSWORD }}
        run: |
          mkdir -p katana_outputs
          if [ -d encrypted_parts ]; then
            find encrypted_parts -name "*.zip" | while read -r zipfile; do
              unzip -P "$ZIP_PWD" -o "$zipfile" -d temp_unzip
              if [ -f temp_unzip/katana_output.jsonl ]; then
                idx=$(basename "$zipfile" .zip | sed 's/katana_output_//')
                mv temp_unzip/katana_output.jsonl "katana_outputs/part_${idx}.jsonl"
              fi
              rm -rf temp_unzip
            done
          fi

      - name: 파이썬 스크립트로 단일 엑셀 변환 (★TARGET_URLS 환경변수 연동)
        env:
          TARGET_URLS: ${{ secrets.TARGET_URLS }}
        run: python json_to_excel.py

      - name: 최종 통합 엑셀 파일 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: full-scan-report
          path: katana_multi_scan_report.xlsx

      - name: 최종 통합 엑셀 파일 아티팩트 링크 Discord 전송
        run: |
          DOWNLOAD_LINK="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ -s katana_multi_scan_report.xlsx ]; then
            curl -H "Content-Type: application/json" \
                 -X POST \
                 -d "{\"content\": \"🚀 **지정 대상 필터링 완료! 병렬 Katana 스캔 보고서** \n\n네이버, 인스타 등 불필요한 외부 도메인을 완벽히 제거한 순정 엑셀 파일입니다. 아래 링크 하단 'Artifacts'에서 받으세요! \n🔗 **다운로드 바로가기:** $DOWNLOAD_LINK\"}" \
                 "${{ secrets.DISCORD_WEBHOOK }}"
          else
            curl -H "Content-Type: application/json" \
                 -X POST \
                 -d "{\"content\": \"⚠️ 병렬 스캔 완료되었으나 지정 도메인에 일치하는 수집 데이터가 없습니다.\"}" \
                 "${{ secrets.DISCORD_WEBHOOK }}"
          fi
