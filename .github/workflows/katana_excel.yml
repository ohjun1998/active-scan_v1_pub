name: Public-Safe Parallel Multi-Target Katana Scan

on:
  workflow_dispatch: 

jobs:
  # [1단계] Secrets에서 URL 개수를 파악하여 가상머신 번호 배열([0, 1, 2...])을 동적으로 생성
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix-json: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: 가상머신 인덱스 생성
        id: set-matrix
        run: |
          JSON_STRING=$(echo "${{ secrets.TARGET_URLS }}" | jq -R -s -c 'split("\n") | map(select(length > 0)) | keys')
          echo "matrix=$JSON_STRING" >> $GITHUB_OUTPUT

  # [2단계] 최대 20대의 가상머신을 동시에 띄워 헤드리스 스텔스 스캔 진행
  katana-parallel-scan:
    needs: setup-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        index: ${{ fromJson(needs.setup-matrix.outputs.matrix-json) }}
      max-parallel: 20
      fail-fast: false # 한 사이트가 실패해도 다른 가상머신은 영향을 받지 않고 계속 돕니다.
    
    steps:
      - name: 타겟 URL 추출 및 마스킹 (보안 핵심)
        run: |
          INDEX=${{ matrix.index }}
          LINE_NUM=$((INDEX + 1))
          TARGET_URL=$(echo "${{ secrets.TARGET_URLS }}" | sed -n "${LINE_NUM}p")
          echo "::add-mask::$TARGET_URL"
          echo "TARGET_URL=$TARGET_URL" >> $GITHUB_ENV

      - name: 도구 및 라이브러리 설치
        run: |
          go install github.com/projectdiscovery/katana/cmd/katana@latest
          
      - name: Katana 개별 헤드리스 스캔 & 실시간 로그 모니터링 (★디버깅 로직 내장)
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          
          # 1. Katana 스캔을 백그라운드로 실행하되, 상세 정보(-v)와 상태 코드(-jc)를 디버그 로그 파일에 쌓습니다.
          # [핵심 수정] 
          # -headless : 자바스크립트를 실행하여 텅 빈 화면에서 링크를 로딩 (0개 발견 문제 해결)
          # -cs host  : 지정한 정확한 호스트만 탐색 (옆 동네 서브도메인 침범 차단)
          katana -u "${{ env.TARGET_URL }}" \
            -c 1 \
            -rl 3 \
            -rd 2 \
            -d 2 \
            -cs host \
            -tlsi random \
            -headless \
            -v \
            -jc \
            -jsonl \
            -o katana_output.jsonl > katana_verbose.log 2>&1 &
          
          KATANA_PID=$!
          
          echo "⏳ [VM-${{ matrix.index }}] 호스트 지정형 헤드리스 스캔 시작 (PID: $KATANA_PID)"
          echo "📢 지정한 주소의 정확한 호스트만 크롤링합니다. (다른 서브도메인은 진입 불가)"
          
          # 2. 30초마다 수집 상황 모니터링 로그 출력
          while kill -0 $KATANA_PID 2>/dev/null; do
            sleep 30
            if [ -f katana_output.jsonl ]; then
              CURRENT_COUNT=$(wc -l < katana_output.jsonl)
              echo "📊 [VM-${{ matrix.index }} 진행 상황] 현재까지 지정 호스트 내부에서 ${CURRENT_COUNT}개의 엔드포인트 수집..."
            else
              echo "📊 [VM-${{ matrix.index }} 진행 상황] 스캔 준비 중 또는 브라우저 로딩 중..."
            fi
          done
          
          wait $KATANA_PID
          EXIT_CODE=$?
          
          # 3. 파일 안정성 검사 및 빈 파일 처리
          if [ -f katana_output.jsonl ]; then
            FINAL_COUNT=$(wc -l < katana_output.jsonl)
          else
            FINAL_COUNT=0
            touch katana_output.jsonl
          fi
          
          # 🚀 [강력한 디버그 장치] 만약 수집된 결과가 0개이거나 실행에 실패했다면, 숨겨진 Katana의 원본 상세 로그를 화면에 뱉어냅니다.
          if [ $FINAL_COUNT -eq 0 ] || [ $EXIT_CODE -ne 0 ]; then
            echo "🚨 [VM-${{ matrix.index }} 원인 분석] 수집 결과가 없거나 에러가 났습니다. 아래 상세 로그를 확인하세요:"
            echo "----------------------------------------------------
