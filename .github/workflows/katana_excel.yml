name: Public-Safe Parallel Multi-Target Katana Scan

on:
  workflow_dispatch: 

jobs:
  # [1단계] Secrets에서 URL 개수를 파악하여 가상머신 번호 배열([0, 1, 2...])을 동적으로 생성
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix-json: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: 가상머신 인덱스 생성
        id: set-matrix
        run: |
          JSON_STRING=$(echo "${{ secrets.TARGET_URLS }}" | jq -R -s -c 'split("\n") | map(select(length > 0)) | keys')
          echo "matrix=$JSON_STRING" >> $GITHUB_OUTPUT

  # [2단계] 최대 20대의 가상머신을 동시에 띄워 실시간 로그 모니터링 스캔 진행
  katana-parallel-scan:
    needs: setup-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        index: ${{ fromJson(needs.setup-matrix.outputs.matrix-json) }}
      max-parallel: 20
    
    steps:
      - name: 타겟 URL 추출 및 마스킹 (보안 핵심)
        run: |
          INDEX=${{ matrix.index }}
          LINE_NUM=$((INDEX + 1))
          TARGET_URL=$(echo "${{ secrets.TARGET_URLS }}" | sed -n "${LINE_NUM}p")
          echo "::add-mask::$TARGET_URL"
          echo "TARGET_URL=$TARGET_URL" >> $GITHUB_ENV

      - name: 도구 및 라이브러리 설치
        run: |
          go install github.com/projectdiscovery/katana/cmd/katana@latest
          
      - name: Katana 개별 스텔스 스캔 & 실시간 로그 모니터링 (★수정된 부분)
        run: |
          # 1. Katana 스캔을 백그라운드(&)로 실행하여 로그 파일에 결과를 쌓습니다.
          katana -u "${{ env.TARGET_URL }}" \
            -c 1 \
            -rl 3 \
            -rd 2 \
            -d 2 \
            -tlsi random \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            -jsonl \
            -o katana_output.jsonl &
          
          # 백그라운드로 실행된 Katana의 프로세스 ID(PID)를 저장합니다.
          KATANA_PID=$!
          
          echo "⏳ [VM-${{ matrix.index }}] Katana 스텔스 스캔 시작 (PID: $KATANA_PID)"
          echo "📢 차단 방지를 위해 천천히 돌고 있으니 안심하셔도 됩니다. 30초마다 진행 상황을 출력합니다."
          
          # 2. Katana 프로세스가 살아있는 동안 30초마다 파일 크기(라인 수)를 체크하여 로그를 남깁니다.
          while kill -0 $KATANA_PID 2>/dev/null; do
            sleep 30
            if [ -f katana_output.jsonl ]; then
              CURRENT_COUNT=$(wc -l < katana_output.jsonl)
              echo "📊 [VM-${{ matrix.index }} 진행 상황] 현재까지 총 ${CURRENT_COUNT}개의 엔드포인트 수집 완료..."
            else
              echo "📊 [VM-${{ matrix.index }} 진행 상황] 스캔 준비 중 또는 첫 엔드포인트 탐색 중..."
            fi
          done
          
          # 3. 백그라운드 프로세스가 완벽히 끝날 때까지 대기 후 최종 결과 출력
          wait $KATANA_PID
          EXIT_CODE=$?
          
          if [ $EXIT_CODE -eq 0 ]; then
            FINAL_COUNT=$(wc -l < katana_output.jsonl 2>/dev/null || echo 0)
            echo "🏁 [VM-${{ matrix.index }} 완료] 스캔이 성공적으로 끝났습니데이! (최종 수집: ${FINAL_COUNT}개)"
          else
            echo "❌ [VM-${{ matrix.index }} 실패] Katana 실행 중 에러가 발생했거나 강제 종료되었습니다. (Exit Code: $EXIT_CODE)"
          fi

      - name: 결과물 비밀번호 압축 암호화 (Public 노출 방지)
        run: |
          zip -P "${{ secrets.ARTIFACT_PASSWORD }}" -r "katana_output_${{ matrix.index }}.zip" katana_output.jsonl

      - name: 임시 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: part-${{ matrix.index }}
          path: katana_output_${{ matrix.index }}.zip
          retention-days: 1

  # [3단계] 모든 가상머신의 스캔이 끝나면 결과들을 수집해 암호를 풀고 엑셀로 병합
  aggregate-results:
    needs: [setup-matrix, katana-parallel-scan]
    runs-on: ubuntu-latest
    steps:
      - name: 레포지토리 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 필수 라이브러리 설치
        run: pip install pandas openpyxl

      - name: 모든 가상머신의 암호화 임시 파일 다운로드
        uses: actions/download-artifact@v4
        with:
          pattern: part-*
          path: encrypted_parts

      - name: 비밀번호 해독 및 압축 해제
        run: |
          mkdir -p katana_outputs
          find encrypted_parts -name "*.zip" | while read -r zipfile; do
            unzip -P "${{ secrets.ARTIFACT_PASSWORD }}" -o "$zipfile" -d temp_unzip
            if [ -f temp_unzip/katana_output.jsonl ]; then
              idx=$(basename "$zipfile" .zip | sed 's/katana_output_//')
              mv temp_unzip/katana_output.jsonl "katana_outputs/part_${idx}.jsonl"
            fi
            rm -rf temp_unzip
          done

      - name: 파이썬 스크립트로 단일 엑셀 변환
        run: python json_to_excel.py

      - name: 최종 통합 엑셀 파일 Discord로 안전 전송 (GitHub에 남기지 않음)
        run: |
          if [ -s katana_multi_scan_report.xlsx ]; then
            curl -H "Content-Type: multipart/form-data" \
                 -F "file=@katana_multi_scan_report.xlsx" \
                 -F "payload_json={\"content\": \"🚀 **초고속 병렬 Katana 스캔 완료!** 가상머신들을 동시 가동하여 수집한 통합 엑셀 파일입니다. (Public 안전 모드)\"}" \
                 "${{ secrets.DISCORD_WEBHOOK }}"
          else
            curl -H "Content-Type: application/json" \
                 -X POST \
                 -d "{\"content\": \"⚠️ 병렬 스캔 결과 통합에 실패했거나 데이터가 없습니다.\"}" \
                 "${{ secrets.DISCORD_WEBHOOK }}"
          fi
